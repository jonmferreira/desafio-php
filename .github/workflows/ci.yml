name: CI

on:
  pull_request:
    branches: [master, main]

jobs:

  # ── Detecta quais partes do monorepo mudaram ─────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend:  ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  # ═══════════════════════════════════════════════════════════════════════════
  # FRONTEND
  # ═══════════════════════════════════════════════════════════════════════════

  # ── 1. Instala/restaura node_modules (compartilhado pelos próximos jobs) ──
  frontend-install:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Restore/save node_modules cache
        id: cache
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install deps (apenas se package-lock mudou)
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: frontend

  # ── 2a. Build ──────────────────────────────────────────────────────────────
  frontend-build:
    needs: [changes, frontend-install]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-${{ hashFiles('frontend/package-lock.json') }}
      - run: npm run build
        working-directory: frontend

  # ── 2b. Lint ───────────────────────────────────────────────────────────────
  frontend-lint:
    needs: [changes, frontend-install]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-${{ hashFiles('frontend/package-lock.json') }}
      - run: npm run lint
        working-directory: frontend

  # ── 3a. Type-check (unit) — só após build + lint passarem ─────────────────
  frontend-typecheck:
    needs: [frontend-build, frontend-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-${{ hashFiles('frontend/package-lock.json') }}
      - run: npm run type-check
        working-directory: frontend

  # ── 3b. E2E (Playwright) — só após build + lint passarem ──────────────────
  frontend-e2e:
    needs: [frontend-build, frontend-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-modules-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: frontend
      - name: Start stack
        run: docker compose up --build -d --wait
      - name: Seed database
        run: docker compose exec -T backend php artisan migrate --seed
      - name: Run E2E tests
        run: npm run e2e
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # BACKEND
  # ═══════════════════════════════════════════════════════════════════════════

  # ── 1. Instala/restaura vendor (compartilhado pelos próximos jobs) ─────────
  backend-install:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          coverage: none
      - name: Restore/save vendor cache
        id: cache
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: vendor-${{ hashFiles('backend/composer.lock') }}
      - name: Install deps (apenas se composer.lock mudou)
        if: steps.cache.outputs.cache-hit != 'true'
        run: composer install --no-interaction --prefer-dist
        working-directory: backend

  # ── 2a. Lint (Pint) ───────────────────────────────────────────────────────
  backend-lint:
    needs: [changes, backend-install]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          coverage: none
      - uses: actions/cache@v4
        with:
          path: backend/vendor
          key: vendor-${{ hashFiles('backend/composer.lock') }}
      - run: vendor/bin/pint --test
        working-directory: backend

  # ── 2b. Testes PHPUnit ────────────────────────────────────────────────────
  backend-test:
    needs: [changes, backend-install]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          coverage: none
      - uses: actions/cache@v4
        with:
          path: backend/vendor
          key: vendor-${{ hashFiles('backend/composer.lock') }}
      - run: cp .env.example .env && php artisan key:generate
        working-directory: backend
      - run: php artisan test
        working-directory: backend

  # ── 3. Build da imagem Docker — só após lint + test passarem ──────────────
  backend-build:
    needs: [backend-lint, backend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
