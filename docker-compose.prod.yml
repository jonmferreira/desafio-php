# Ambiente de producao/avaliacao — frontend buildado e servido por Nginx
# Uso: docker-compose -f docker-compose.prod.yml up --build

services:
  frontend:
    build:
      context: ./frontend
      target: prod
    ports:
      - "8080:80"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: desafio
      POSTGRES_USER: desafio
      POSTGRES_PASSWORD: desafio
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U desafio -d desafio"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/up"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
