# Ambiente de desenvolvimento — Vite dev server (hot-reload) + PostgreSQL
# Uso: docker-compose up --build

services:
  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: desafio
      POSTGRES_USER: desafio
      POSTGRES_PASSWORD: desafio
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U desafio -d desafio"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www
      - backend_vendor:/var/www/vendor
      - backend_storage:/var/www/storage
      - backend_bootstrap_cache:/var/www/bootstrap/cache
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/up"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  backend_vendor:
  backend_storage:
  backend_bootstrap_cache:
